<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Chess AI</title><link rel="stylesheet"
href="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"><style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding: 10px;
}

/* Screens */
#menu { margin-top: 50px; }
#game { display: none; }

/* Board */
#board {
  width: 320px;
  margin: 15px auto;
}

/* Player Info */
.info {
  display: flex;
  justify-content: space-between;
  padding: 5px 20px;
  font-weight: bold;
}

/* Captured pieces */
.captured {
  font-size: 14px;
  min-height: 20px;
}

/* Button */
button {
  padding: 10px 20px;
  font-size: 16px;
  margin-top: 10px;
}
</style></head><body><!-- MENU SCREEN --><div id="menu">
  <h2>♟️ Chess AI</h2>  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="hard">Hard</option>
    <option value="impossible">Impossible</option>
  </select>  <br>
  <button onclick="startGame()">Start Game</button>
</div><!-- GAME SCREEN --><div id="game">  <div class="info">
    <div>🤖 Computer</div>
    <div>🧑 You</div>
  </div>  <div class="info">
    <div id="compCaptured" class="captured"></div>
    <div id="playerCaptured" class="captured"></div>
  </div>  <div id="board"></div></div><script src="https://code.jquery.com/jquery-3.6.0.min.js"></script><script src="https://unpkg.com/chess.js@0.13.4/chess.min.js"></script><script src="https://unpkg.com/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script><script>

let game, board;
let playerCaptured = [];
let compCaptured = [];

function startGame() {

  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  game = new Chess();

  board = Chessboard('board', {
    draggable: true,
    position: 'start',
    pieceTheme: 'https://unpkg.com/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png',
    onDrop: onDrop
  });
}

function onDrop(source, target) {

  let move = game.move({
    from: source,
    to: target,
    promotion: 'q'
  });

  if (move === null) return 'snapback';

  // Track captured pieces
  if (move.captured) {
    playerCaptured.push(move.captured);
    updateCaptured();
  }

  setTimeout(aiMove, 300);
}

function aiMove() {

  let level = document.getElementById("difficulty").value;
  let moves = game.moves({ verbose: true });

  if (moves.length === 0) return;

  let move;

  if (level === "easy") {
    move = moves[Math.floor(Math.random() * moves.length)];
  }
  else if (level === "hard") {
    let captures = moves.filter(m => m.captured);
    move = captures.length
      ? captures[Math.floor(Math.random() * captures.length)]
      : moves[Math.floor(Math.random() * moves.length)];
  }
  else {
    move = moves[Math.floor(Math.random() * moves.length)];
  }

  game.move(move);

  // Track AI captured
  if (move.captured) {
    compCaptured.push(move.captured);
    updateCaptured();
  }

  board.position(game.fen());
}

function updateCaptured() {
  document.getElementById("playerCaptured").innerText =
    "Captured: " + playerCaptured.join(" ");

  document.getElementById("compCaptured").innerText =
    "Captured: " + compCaptured.join(" ");
}

</script></body>
</html>

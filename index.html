<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
}

#board{
width:350px;
margin:auto;
}
</style>
</head>

<body>

<h2>Chess AI</h2>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="hard">Hard</option>
<option value="impossible">Impossible</option>
</select>

<div id="board"></div>

<script>

var game = new Chess();

var board = Chessboard('board',{
draggable:true,
position:'start',

// 🔥 IMPORTANT FIX (image path)
pieceTheme:
'https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/img/chesspieces/wikipedia/{piece}.png',

onDrop:onDrop
});

function onDrop(source,target){

var move = game.move({
from:source,
to:target,
promotion:'q'
});

if(move===null){
return 'snapback';
}

setTimeout(aiMove,300);
}

function aiMove(){

var level =
document.getElementById("difficulty").value;

var moves = game.moves();

if(moves.length===0) return;

var move;

if(level==="easy"){

move =
moves[Math.floor(Math.random()*moves.length)];

}
else if(level==="hard"){

var captures = [];

for(var i=0;i<moves.length;i++){
if(moves[i].includes("x")){
captures.push(moves[i]);
}
}

if(captures.length>0){
move =
captures[Math.floor(Math.random()*captures.length)];
}
else{
move =
moves[Math.floor(Math.random()*moves.length)];
}

}
else{

move =
moves[Math.floor(Math.random()*moves.length)];

}

game.move(move);
board.position(game.fen());

}

</script>

</body>
</html>
